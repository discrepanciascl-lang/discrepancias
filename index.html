<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>discrepancias.cl · Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f4fb;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1a2340;
      --muted:   #6b7db3;
      --accent:  #2563eb;
      --accent2: #6d28d9;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 20%, rgba(37,99,235,.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(109,40,217,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Card */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
      padding: 52px 44px;
      max-width: 460px;
      width: 90%;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo-wrap {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 48px rgba(37, 99, 235, .25);
    }

    /* Titles */
    .site-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(26px, 6vw, 40px);
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    .soon-text {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(18px, 4vw, 26px);
      color: var(--text);
      letter-spacing: -.3px;
      margin-top: 4px;
    }

    .description {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 340px;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: .3px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .45; transform: scale(.75); }
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      opacity: .45;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Logo -->
    <div class="logo-wrap">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
        <rect x="1"  y="1"  width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
        <rect x="8"  y="1"  width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
        <rect x="15" y="1"  width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
        <rect x="1"  y="8"  width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
        <rect x="15" y="8"  width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
        <rect x="1"  y="15" width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
        <rect x="8"  y="15" width="6" height="6" rx="1.2" fill="white" fill-opacity=".95"/>
      </svg>
    </div>

    <!-- Text -->
    <div>
      <div class="site-name">discrepancias.cl</div>
      <div class="soon-text">Próximamente</div>
    </div>

    <p class="description">
      Una plataforma de inteligencia jurídica para el análisis de discrepancias ante el Panel de Expertos del sistema eléctrico chileno.
    </p>

    <div class="badge">
      <span class="badge-dot"></span>
      En desarrollo · Lanzamiento pronto
    </div>
  </div>

  <footer>© 2026 discrepancias.cl · Todos los derechos reservados</footer>

</body>
</html>
